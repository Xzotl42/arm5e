<ol class="items-list backSection margintop18">
    <li class="item flexrow item-header">
        <div class="item-image"></div>
        <div class="section-title">{{localize "arm5e.sheet.rawVis"}}</div>
        <div class="item-controls">
            <a class="item-control item-create" data-action="itemCreate"
                title='{{localize "arm5e.hints.create" item=(localize "TYPES.Item.vis")}}' data-type="vis"><i
                    class="fas fa-plus"></i>{{localize "arm5e.sheet.action.Create"}}</a>
        </div>
    </li>
    {{> "systems/arm5e/templates/generic/metalic-bar.html" }}
    {{#each system.vis as |item id|}}
        <li class="item draggable item-value flexrow" data-name="{{item.name}}" data-item-id="{{item._id}}">
            <div class="item-image item-control item-edit" data-action="itemEdit"><img src="{{item.img}}"
                    title="{{item.name}}" /></div>
            <div class="flexrow flex-center">
                <span class="flexrow item-title">{{item.name}}</span>
                <label class="label-light"><span class="bold">{{localize "arm5e.sheet.art"}}:</span>
                    {{#with (lookup @root.config.magic.arts item.system.art)~}}{{label~}} {{/with}}</label>
                <label class="label-light"><span class="bold">{{localize "arm5e.sheet.pawns"}}:</span>
                    {{item.system.quantity}}</label>
            </div>
            <div class="item-controls">
                {{#if ../system.isMagus}}
                    <a class="vis-study" data-action="visStudy" title="{{localize 'arm5e.activity.visStudy'}}"><i
                            class="ars-Icon_Effects"></i>
                    </a>
                {{/if}}
                <a class="item-control item-edit" data-action="itemEdit"
                    title='{{localize "arm5e.hints.edit" item=(localize "TYPES.Item.vis")}}'><i
                        class="ars-Icon_Edit"></i></a>
                <a class="item-control item-delete" data-action="itemDelete"
                    title='{{localize "arm5e.hints.delete" item=(localize "TYPES.Item.vis")}}'><i
                        class="ars-Icon_Delete_Hand_Gesture"></i></a>
            </div>
        </li>
    {{/each}}
</ol>
