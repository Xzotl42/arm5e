<div class="{{cssClass}}  mainNPC">
  <div class="header-background">
    <img src="{{systemPath}}assets/NPC/header150.png" />
  </div>
  <div class="sheet-content flexcol limited-sheet" autocomplete="off">
    {{!-- Sheet Header --}}
    <header>
      <div class="flexrow">
        <div class="flexcol" style="max-width: 200px; flex-grow: 1;">
          <div style="flex-grow: 1; max-height: 200px; padding: 5px;"><img src="{{actor.img}}" data-edit="img"
              width="200px" title="{{actor.name}}" /></div>
        </div>
        <div class="flexcol">
          <h1 class="bigname flex0" style="padding: 5px; ">
            <input class="flex1" name="name" type="text" value="{{actor.name}}" placeholder="Name"
              style="min-height: 48px;" />
          </h1>
          <label class="smallTitle">{{localize "arm5e.sheet.apparentAge"}} : {{system.apparent.value}}</label>
        </div>
      </div>
    </header>
    <section class="sheet-body" style="min-height: 300px; flex-grow: 1; display: flex; flex-direction: column;">
      <div class="flex-group-left padding12 backSection extendable"
        style="flex-grow: 1; display: flex; flex-direction: column;">
        <label class="smallTitle">{{localize "arm5e.sheet.biography"}}</label>
        {{> (systemPath "templates/generic/ars-editor-V2.hbs")
          content=enrichedBiography
          target="system.biography"
          flavor=""
          editable=editable
        }}
      </div>
    </section>
  </div>
</div>
